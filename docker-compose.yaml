######## NETWORKS ########
networks:
  default:
    name: main
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16
  ingress:
    name: ingress
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  apps:
    name: apps
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.1.0/24
  admin:
    name: admin
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.2.0/24
  monitoring:
    name: monitoring
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.3.0/24
  internal-db:
    name: internal-db
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.4.0/24
include:
  ######## SERVICES ########
  # CORE
  - compose/cloudflare-ddns.yml
  - compose/portainer.yml
  - compose/nginx.yml
  - compose/homepage.yml
  - compose/dozzle.yml
  - compose/pihole.yml

  # BACKUPS
  - compose/duplicati.yml

  # MEDIA
  # - compose/DUMB.yml
  # - compose/DMB.yml
  # - compose/plex.yml
  # - compose/overseerr.yml

  # MEDIA STATS
  # - compose/tautulli.yml

  # TOOLS
  - compose/firefly/firefly.yml
  - compose/actualbudget.yml
  - compose/homeassistant.yml
  # - compose/calcom/calcom.yml
  - compose/paperlessngx/paperlessngx.yml
  - compose/speedtesttracker.yml
  - compose/ittools.yml
  # - compose/clementines.yml
  - compose/diun.yml
  # - compose/tandoor/tandoor.yml
  - compose/uptime-kuma.yml
  - compose/netdata.yml
  - compose/beszel.yml

  #DEV
  # - compose/DMBDev.yml
  # - compose/wppconnect.yml
  # - compose/dumb.yml