services:
  DMB:
    container_name: DMB
    image: iampuid0/dmb:latest
    stop_grace_period: 30s
    shm_size: 128mb                                                  ## Increased for PostgreSQL    
    stdin_open: true
    tty: true
    networks:
      - default
      - apps
    volumes:
      - $APPDIR/DMB/config:/config                     ## Location of configuration files. If a Zurg config.yml and/or Zurg app is placed here, it will be used to override the default configuration and/or app used at startup.
      - $APPDIR/DMB/log:/log                           ## Location for logs
      - $APPDIR/DMB/Zurg/RD:/zurg/RD                   ## Location for Zurg RealDebrid active configuration
      - $APPDIR/DMB/Zurg/mnt:/data:shared              ## Location for rclone mount to host
      - $APPDIR/DMB/Riven/data:/riven/backend/data     ## Location for Riven backend data
      - $APPDIR/DMB/Riven/mnt:/mnt                     ## Location for Riven symlinks
      - $APPDIR/DMB/PostgreSQL/data:/postgres_data     ## Location for PostgreSQL database
      - $APPDIR/DMB/pgAdmin4/data:/pgadmin/data        ## Location for pgAdmin 4 data
      - $APPDIR/DMB/Zilean/data:/zilean/app/data       ## Location for Zilean data
      - $APPDIR/DMB/plex_debrid:/plex_debrid/config    ## Location for plex_debrid data
      - $APPDIR/DMB/cli_debrid:/cli_debrid/data        ## Location for cli_debrid data
      - $APPDIR/DMB/phalanx_db:/phalanx_db/data        ## Location for phalanx_db data
    environment:
      - TZ=$TZ
      - PUID=$PUID
      - PGID=$PGID
      - DMB_LOG_LEVEL=INFO
      - ZURG_INSTANCES_REALDEBRID_API_KEY=$RD_API_KEY
      #- RIVEN_FRONTEND_ENV_ORIGIN=http://$SERVER_IP:3001
      - RIVEN_FRONTEND_ENV_ORIGIN=http://miniserver:3001
    ports:
      - "3005:3005"                                                 ## DMB Frontend
      - "3001:3000"                                                 ## Riven Frontend
      - "8081:8080"                                                 ## Riven Backend
      - "5050:5050"                                                 ## pgAdmin 4
      - "8182:8182"                                                 ## Zilean
      - "9090:9090"                                                 ## Zurg
      - "8123:8000"                                                 ## DMB FastAPI
      - "2228:5000"                                                 ## CLI Debrid
      - "2229:8888"                                                 ## Palanx DB
    devices:
      - /dev/fuse:/dev/fuse:rwm
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
      - no-new-privileges
