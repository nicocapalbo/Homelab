services:
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    network_mode: "host"
    #networks:
    #  - default
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    # profiles: ["media", "all"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:32400/web/index.html"]  # Simple health check for Plex
      interval: 1m
      timeout: 10s
      retries: 5
      start_period: 30s
    devices:
      - /dev/dri:/dev/dri # for hardware transcoding
    #ports:
    #  - "32400:32400/tcp"
    #  - "3005:3005/tcp"
    #  - "8324:8324/tcp"
    #  - "32469:32469/tcp"
    #  - "1900:1900/udp"
    #  - "32410:32410/udp"
    #  - "32412:32412/udp"
    #  - "32413:32413/udp"
    #  - "32414:32414/udp"
    volumes:
      - $APPDIR/plex:/config
      - /dev/shm:/data/transcode # Offload transcoding to RAM if you have enough RAM
      - realdebrid:/torrents
      - $DATADIR/movies:/media/movie:ro
    environment:
      TZ: $TZ
      HOSTNAME: "myPlex"
      PLEX_CLAIM: ${PLEX_CLAIM}
      PLEX_UID: $PUID
      PLEX_GID: $PGID
      ADVERTISE_IP: "http://$SERVER_IP:32400/"
      ALLOWED_NETWORKS: $LOCAL_IPS
volumes:
    realdebrid:
        external: true
