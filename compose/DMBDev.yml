services:
  DMBDEV:
    container_name: DMBDEV
    image: iampuid0/dmb:latest
    stop_grace_period: 30s
    shm_size: 128mb                                                  ## Increased for PostgreSQL    
    stdin_open: true
    tty: true
    networks:
      - default
      - apps
    volumes:
      - $APPDIR/DMBDEV/config:/config                     ## Location of configuration files. If a Zurg config.yml and/or Zurg app is placed here, it will be used to override the default configuration and/or app used at startup.
      - $APPDIR/DMBDEV/log:/log                           ## Location for logs
      - $APPDIR/DMBDEV/Zurg/RD:/zurg/RD                   ## Location for Zurg RealDebrid active configuration
      - $APPDIR/DMBDEV/Zurg/mnt:/data:shared              ## Location for rclone mount to host
      - $APPDIR/DMBDEV/Riven/data:/riven/backend/data     ## Location for Riven backend data
      - $APPDIR/DMBDEV/Riven/mnt:/mnt                     ## Location for Riven symlinks
      - $APPDIR/DMBDEV/PostgreSQL/data:/postgres_data     ## Location for PostgreSQL database
      - $APPDIR/DMBDEV/pgAdmin4/data:/pgadmin/data        ## Location for pgAdmin 4 data
      - $APPDIR/DMBDEV/Zilean/data:/zilean/app/data       ## Location for Zilean data
      - $APPDIR/DMBDEV/plex_debrid:/plex_debrid/config    ## Location for plex_debrid data
      - $APPDIR/DMBDEV/cli_debrid:/cli_debrid/data        ## Location for cli_debrid data
      - $APPDIR/DMBDEV/phalanx_db:/phalanx_db/data        ## Location for phalanx_db data
    environment:
      - TZ=$TZ
      - PUID=$PUID
      - PGID=$PGID
      - DMB_LOG_LEVEL=INFO
      - ZURG_INSTANCES_REALDEBRID_API_KEY=$RD_API_KEY
      #- RIVEN_FRONTEND_ENV_ORIGIN=http://$SERVER_IP:3001
      - RIVEN_FRONTEND_ENV_ORIGIN=http://miniserver:3001
      - ZILEAN_ENABLED=false
    ports:
      - "7771:3005"                                                 ## DMB Frontend
      - "7772:3000"                                                 ## Riven Frontend
      - "7773:8080"                                                 ## Riven Backend
      - "7774:5050"                                                 ## pgAdmin 4
      - "7775:8182"                                                 ## Zilean
      - "7776:9090"                                                 ## Zurg
      - "7777:8000"                                                 ## DMB FastAPI
      - "7778:5000"                                                 ## CLI Debrid
      - "7779:8888"                                                 ## Palanx DB
    devices:
      - /dev/fuse:/dev/fuse:rwm
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
      - no-new-privileges
