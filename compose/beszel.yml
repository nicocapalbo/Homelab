services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    networks:
      - monitoring
      - apps
    ports:
      - 8090:8090
    volumes:
      - ${APPDIR}/beszel/beszel_data:/beszel_data
      - ${APPDIR}/beszel/beszel_socket:/beszel_socket
  beszel-agent:
    image: henrygd/beszel-agent
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${APPDIR}/beszel/beszel_agent_data:/var/lib/beszel-agent
      - ${APPDIR}/beszel/beszel_socket:/beszel_socket
      # monitor other disks / partitions by mounting a folder in /extra-filesystems
      # - /mnt/disk/.beszel:/extra-filesystems/sda1:ro
    environment:
      LISTEN: 45876
      KEY: 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIN9Q6wwmqgS0Kcymz7BGQmWkz3ktYgt4von7650Je3zQ'
      TOKEN: 15d-151ad01127d-61c-7682d2bb434
      HUB_URL: http://127.0.0.1:8090